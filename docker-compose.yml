name: bigdata-eligibilite-cluster

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Pattern officiel Airflow pour ajouter des providers en dev/démo.
    # En production : construire une image custom (voir README) plutôt que cet env var.
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-apache-spark==4.11.0 pyspark==3.5.1 mlflow==2.14.1"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark/jobs:/opt/airflow/spark-jobs
  networks:
    - bigdata-net

services:
  # ------------------------------------------------------------------
  # MASTER : plan de contrôle (métadonnées + orchestration uniquement)
  # ------------------------------------------------------------------

  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bigdata-net

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres-airflow:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname Admin \
          --role Admin --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  # Nifi fait ici office de coordinateur de flux (rôle "master" au sens
  # métadonnées/état des flux). Pour un vrai cluster Nifi multi-nœuds,
  # il faut ajouter Zookeeper + les variables NIFI_CLUSTER_* (voir README).
  nifi:
    image: apache/nifi:1.27.0
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: ChangeMeNow123!
      NIFI_WEB_HTTPS_PORT: "8443"
    ports:
      - "8443:8443"
    volumes:
      - nifi-data:/opt/nifi/nifi-current/data
      - nifi-flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi-content:/opt/nifi/nifi-current/content_repository
    networks:
      - bigdata-net

  spark-master:
    build:
      context: ./spark
    command: ["/opt/bitnami/scripts/spark/run.sh"]
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8081:8080" # UI Spark Master (8080 déjà pris par Airflow)
    networks:
      - bigdata-net

  mlflow:
    build:
      context: ./mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - bigdata-net

  # ------------------------------------------------------------------
  # WORKERS : calcul distribué (Spark Executors + stack ML)
  # ------------------------------------------------------------------

  spark-worker-1:
    build:
      context: ./spark
    command: ["/opt/bitnami/scripts/spark/run.sh"]
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./spark/jobs:/opt/spark-jobs
    depends_on:
      - spark-master
    networks:
      - bigdata-net

  spark-worker-2:
    build:
      context: ./spark
    command: ["/opt/bitnami/scripts/spark/run.sh"]
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./spark/jobs:/opt/spark-jobs
    depends_on:
      - spark-master
    networks:
      - bigdata-net

networks:
  bigdata-net:
    driver: bridge

volumes:
  postgres-airflow-data:
  nifi-data:
  nifi-flowfile:
  nifi-content:
  mlflow-data:
